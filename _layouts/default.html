<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>

    <header class="site-header">
      <div class="container">
        <div class="site-header-inner">
          <a href="{{ site.baseurl }}/" class="site-logo">
            <div class="avatar-ring">
              <img src="{{ site.avatar }}" alt="{{ site.name }}" class="site-avatar-img" />
            </div>
            <div class="site-identity">
              <span class="site-name">{{ site.name }}</span>
              <span class="site-badge">
                <span class="badge-dot"></span>
                {{ site.description }}
              </span>
            </div>
          </a>
          <nav class="site-nav">
            <a href="{{ site.baseurl }}/" class="nav-link">Writing</a>
            <a href="{{ site.baseurl }}/about" class="nav-link">About</a>
          </nav>
        </div>
      </div>
    </header>

    <main id="main" role="main" class="container main-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <div class="footer-social">
            {% include svg-icons.html %}
          </div>
          <p class="footer-copy">
            &copy; {{ site.time | date: '%Y' }} {{ site.name }} &middot; Backend Engineer
          </p>
        </div>
      </div>
    </footer>

    {% include analytics.html %}
  </body>
</html>
