<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="450" viewBox="0 0 820 450"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="450" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">JWT Authentication Flow with Refresh Tokens</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="60" width="120" height="45" rx="6" ry="6"
          fill="#ffffff" stroke="#1e1e2e" stroke-width="2"/>
  </g>
  <text x="80" y="87.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e1e2e">Client</text>
  <line x1="80" y1="105" x2="80" y2="430"
               stroke="#e5e3de" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g filter="url(#rough)">
    <rect x="220" y="60" width="120" height="45" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="280" y="87.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">Auth Service</text>
  <line x1="280" y1="105" x2="280" y2="430"
               stroke="#e5e3de" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g filter="url(#rough)">
    <rect x="440" y="60" width="120" height="45" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="500" y="87.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">API Service</text>
  <line x1="500" y1="105" x2="500" y2="430"
               stroke="#e5e3de" stroke-width="1.5" stroke-dasharray="4 3"/>
  <g filter="url(#rough)">
    <rect x="640" y="60" width="120" height="45" rx="6" ry="6"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="700" y="87.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">Redis / DB</text>
  <line x1="700" y1="105" x2="700" y2="430"
               stroke="#e5e3de" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="85" y1="130" x2="275" y2="130"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="180" y="125" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">① POST /login (email + password)</text>
  <line x1="285" y1="165" x2="695" y2="165"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="490" y="160" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">② Verify credentials</text>
  <line x1="695" y1="200" x2="285" y2="200"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="490" y="195" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">③ User record (right arrow back)</text>
  <line x1="285" y1="235" x2="695" y2="235"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="490" y="230" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">④ Store refresh_token (7d TTL)</text>
  <line x1="275" y1="270" x2="85" y2="270"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="180" y="265" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">⑤ access_token (15m) + refresh_token cookie</text>
  <line x1="85" y1="305" x2="495" y2="305"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="290" y="300" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">⑥ GET /api/data  Authorization: Bearer <token></text>
  <line x1="495" y1="340" x2="85" y2="340"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="290" y="335" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">⑦ 200 OK + data</text>
  <line x1="85" y1="375" x2="275" y2="375"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="180" y="370" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">⑧ POST /refresh  (expired access_token)</text>
  <line x1="275" y1="410" x2="85" y2="410"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="180" y="405" text-anchor="middle"
               font-family="Caveat, cursive" font-size="11" fill="#374151">⑨ New access_token + rotated refresh_token</text></svg>