<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="900" height="580" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="15" font-weight="bold" fill="#e2e8f0">Vault + Kubernetes: Zero-Downtime Secrets Rotation</text>

  <!-- Kubernetes Cluster box -->
  <rect x="30" y="60" width="540" height="490" rx="10" fill="#1e2433" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="300" y="85" text-anchor="middle" font-size="12" fill="#3b82f6" font-weight="bold">Kubernetes Cluster</text>

  <!-- Pod box -->
  <rect x="55" y="100" width="490" height="420" rx="8" fill="#161b27" stroke="#4b5563" stroke-width="1"/>
  <text x="300" y="122" text-anchor="middle" font-size="11" fill="#9ca3af">Pod</text>

  <!-- App Container -->
  <rect x="75" y="135" width="200" height="110" rx="6" fill="#1a2035" stroke="#6366f1" stroke-width="1.5"/>
  <text x="175" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#a5b4fc">App Container</text>
  <text x="175" y="178" text-anchor="middle" font-size="9" fill="#d1d5db">reads /vault/secrets/</text>
  <text x="175" y="194" text-anchor="middle" font-size="9" fill="#d1d5db">db-creds (file-based)</text>
  <text x="175" y="213" text-anchor="middle" font-size="9" fill="#6ee7b7">No rotation logic needed</text>
  <text x="175" y="229" text-anchor="middle" font-size="9" fill="#6ee7b7">No restart required</text>

  <!-- Vault Agent Sidecar -->
  <rect x="315" y="135" width="210" height="110" rx="6" fill="#1a2035" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="#fcd34d">Vault Agent Sidecar</text>
  <text x="420" y="178" text-anchor="middle" font-size="9" fill="#d1d5db">• Kubernetes Auth</text>
  <text x="420" y="194" text-anchor="middle" font-size="9" fill="#d1d5db">• Lease renewal loop</text>
  <text x="420" y="210" text-anchor="middle" font-size="9" fill="#d1d5db">• Template rendering</text>
  <text x="420" y="226" text-anchor="middle" font-size="9" fill="#fcd34d">• Revoke on pod exit</text>

  <!-- Shared Volume -->
  <rect x="150" y="270" width="300" height="50" rx="6" fill="#0f2040" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="300" y="291" text-anchor="middle" font-size="11" font-weight="bold" fill="#38bdf8">Shared In-Memory Volume</text>
  <text x="300" y="309" text-anchor="middle" font-size="9" fill="#94a3b8">/vault/secrets/  (tmpfs — never touches disk)</text>

  <!-- ServiceAccount token -->
  <rect x="75" y="345" width="190" height="60" rx="6" fill="#1a2035" stroke="#8b5cf6" stroke-width="1"/>
  <text x="170" y="366" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">ServiceAccount JWT</text>
  <text x="170" y="383" text-anchor="middle" font-size="9" fill="#d1d5db">auto-mounted by k8s</text>
  <text x="170" y="399" text-anchor="middle" font-size="9" fill="#d1d5db">projected token (1h TTL)</text>

  <!-- Init Container -->
  <rect x="305" y="345" width="225" height="60" rx="6" fill="#1a2035" stroke="#10b981" stroke-width="1"/>
  <text x="417" y="366" text-anchor="middle" font-size="10" font-weight="bold" fill="#6ee7b7">Init Container</text>
  <text x="417" y="383" text-anchor="middle" font-size="9" fill="#d1d5db">vault-agent-init</text>
  <text x="417" y="399" text-anchor="middle" font-size="9" fill="#d1d5db">populates secrets before app starts</text>

  <!-- Policy box -->
  <rect x="75" y="430" width="450" height="70" rx="6" fill="#0d1f2d" stroke="#374151" stroke-width="1"/>
  <text x="300" y="452" text-anchor="middle" font-size="10" font-weight="bold" fill="#9ca3af">Vault Policy (attached to k8s role)</text>
  <text x="300" y="470" text-anchor="middle" font-size="9" fill="#6b7280">path "database/creds/app-role" { capabilities = ["read"] }</text>
  <text x="300" y="488" text-anchor="middle" font-size="9" fill="#6b7280">path "secret/data/app/*"       { capabilities = ["read"] }</text>

  <!-- HashiCorp Vault -->
  <rect x="610" y="60" width="260" height="490" rx="10" fill="#1e2433" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="740" y="85" text-anchor="middle" font-size="12" fill="#f59e0b" font-weight="bold">HashiCorp Vault</text>

  <!-- Auth Methods -->
  <rect x="630" y="100" width="220" height="80" rx="6" fill="#1a2035" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#c4b5fd">Auth: kubernetes</text>
  <text x="740" y="138" text-anchor="middle" font-size="9" fill="#d1d5db">validates JWT against</text>
  <text x="740" y="154" text-anchor="middle" font-size="9" fill="#d1d5db">k8s TokenReview API</text>
  <text x="740" y="170" text-anchor="middle" font-size="9" fill="#6ee7b7">issues short-lived Vault token</text>

  <!-- Dynamic Secrets Engine -->
  <rect x="630" y="200" width="220" height="100" rx="6" fill="#1a2035" stroke="#ef4444" stroke-width="1.5"/>
  <text x="740" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="#fca5a5">Database Secrets Engine</text>
  <text x="740" y="240" text-anchor="middle" font-size="9" fill="#d1d5db">• Generates unique creds</text>
  <text x="740" y="256" text-anchor="middle" font-size="9" fill="#d1d5db">• TTL: 1h (configurable)</text>
  <text x="740" y="272" text-anchor="middle" font-size="9" fill="#d1d5db">• Auto-renews via agent</text>
  <text x="740" y="288" text-anchor="middle" font-size="9" fill="#fca5a5">• Revokes on pod death</text>

  <!-- KV Secrets -->
  <rect x="630" y="320" width="220" height="70" rx="6" fill="#1a2035" stroke="#0ea5e9" stroke-width="1"/>
  <text x="740" y="342" text-anchor="middle" font-size="10" font-weight="bold" fill="#38bdf8">KV v2 Secrets Engine</text>
  <text x="740" y="360" text-anchor="middle" font-size="9" fill="#d1d5db">static secrets with versioning</text>
  <text x="740" y="378" text-anchor="middle" font-size="9" fill="#d1d5db">TLS certs, API keys, etc.</text>

  <!-- Audit Log -->
  <rect x="630" y="410" width="220" height="60" rx="6" fill="#1a2035" stroke="#4b5563" stroke-width="1"/>
  <text x="740" y="432" text-anchor="middle" font-size="10" font-weight="bold" fill="#9ca3af">Audit Log (file/syslog)</text>
  <text x="740" y="450" text-anchor="middle" font-size="9" fill="#6b7280">every request logged</text>
  <text x="740" y="466" text-anchor="middle" font-size="9" fill="#6b7280">lease id, entity, path, time</text>

  <!-- Lease Lifecycle -->
  <rect x="630" y="490" width="220" height="50" rx="6" fill="#0d1f2d" stroke="#374151" stroke-width="1"/>
  <text x="740" y="511" text-anchor="middle" font-size="9" font-weight="bold" fill="#6b7280">Lease Lifecycle</text>
  <text x="740" y="527" text-anchor="middle" font-size="9" fill="#6b7280">create → renew (≤max_ttl) → revoke</text>

  <!-- Arrows: Agent → Vault Auth -->
  <line x1="525" y1="172" x2="630" y2="140" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="572" y="148" font-size="8" fill="#8b5cf6">JWT auth</text>

  <!-- Arrows: Vault DB Engine → Agent (creds) -->
  <line x1="630" y1="250" x2="525" y2="190" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)" stroke-dasharray="4,2"/>
  <text x="556" y="230" font-size="8" fill="#ef4444">dyn creds</text>

  <!-- Agent writes to volume -->
  <line x1="420" y1="245" x2="350" y2="270" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-yellow)"/>

  <!-- App reads from volume -->
  <line x1="250" y1="270" x2="205" y2="245" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- ServiceAccount to Agent -->
  <line x1="265" y1="375" x2="315" y2="375" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arr-purple)" stroke-dasharray="3,2"/>
  <text x="280" y="368" font-size="8" fill="#8b5cf6">JWT</text>

  <!-- Defs for arrowheads -->
  <defs>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
  </defs>
</svg>
