  <line x1="740" y1="470" x2="785" y2="300" stroke="#818cf8" stroke-width="1.5" marker-end="url(#ap)"/>
  <line x1="785" y1="248" x2="700" y2="148" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#ap)"/>
  <line x1="100" y1="140" x2="99" y2="337" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>
  <line x1="240" y1="140" x2="245" y2="337" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>
  <line x1="380" y1="140" x2="350" y2="337" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ab)"/>
  <rect x="22" y="540" width="916" height="30" fill="#111827" rx="4"/>
  <line x1="40" y1="555" x2="68" y2="555" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="74" y="559" fill="#93c5fd" font-size="9">syscall / call flow</text>
  <line x1="190" y1="555" x2="218" y2="555" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="224" y="559" fill="#fde68a" font-size="9">eBPF attach hook</text>
  <line x1="330" y1="555" x2="358" y2="555" stroke="#4ade80" stroke-width="1.5"/>
  <text x="364" y="559" fill="#86efac" font-size="9">BPF program lifecycle</text>
  <line x1="500" y1="555" x2="528" y2="555" stroke="#818cf8" stroke-width="1.5"/>
  <text x="534" y="559" fill="#a5b4fc" font-size="9">map read/write (kernel to user)</text>
  <rect x="750" y="547" width="12" height="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="767" y="558" fill="#93c5fd" font-size="9">zero application code changes</text>
