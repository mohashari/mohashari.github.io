<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0f1117" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">Circuit Breaker State Machine &amp; Microservice Resilience</text>

  <!-- ===== STATE MACHINE (top half) ===== -->
  <!-- CLOSED state -->
  <ellipse cx="180" cy="160" rx="70" ry="40" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="180" y="155" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">CLOSED</text>
  <text x="180" y="172" text-anchor="middle" fill="#86efac" font-size="10">Requests flow</text>

  <!-- OPEN state -->
  <ellipse cx="450" cy="160" rx="70" ry="40" fill="#3a1a1a" stroke="#f87171" stroke-width="2"/>
  <text x="450" y="155" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">OPEN</text>
  <text x="450" y="172" text-anchor="middle" fill="#fca5a5" font-size="10">Fail fast</text>

  <!-- HALF-OPEN state -->
  <ellipse cx="720" cy="160" rx="70" ry="40" fill="#2a2a1a" stroke="#fbbf24" stroke-width="2"/>
  <text x="720" y="155" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="bold">HALF-OPEN</text>
  <text x="720" y="172" text-anchor="middle" fill="#fde68a" font-size="10">Probe requests</text>

  <!-- Arrow: CLOSED -> OPEN -->
  <line x1="250" y1="150" x2="375" y2="150" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="312" y="140" text-anchor="middle" fill="#f87171" font-size="10">failure rate</text>
  <text x="312" y="152" text-anchor="middle" fill="#f87171" font-size="10">&gt; threshold</text>

  <!-- Arrow: OPEN -> HALF-OPEN -->
  <line x1="520" y1="150" x2="645" y2="150" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="582" y="140" text-anchor="middle" fill="#fbbf24" font-size="10">wait window</text>
  <text x="582" y="152" text-anchor="middle" fill="#fbbf24" font-size="10">expires</text>

  <!-- Arrow: HALF-OPEN -> CLOSED (success) -->
  <path d="M 720 120 Q 450 60 180 120" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="450" y="72" text-anchor="middle" fill="#4ade80" font-size="10">probe success</text>

  <!-- Arrow: HALF-OPEN -> OPEN (failure) -->
  <path d="M 720 195 Q 585 240 450 195" fill="none" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red2)"/>
  <text x="585" y="238" text-anchor="middle" fill="#f87171" font-size="10">probe failed</text>

  <!-- ===== ARCHITECTURE (bottom half) ===== -->
  <!-- Divider -->
  <line x1="40" y1="230" x2="860" y2="230" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>

  <!-- Client -->
  <rect x="40" y="265" width="110" height="60" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="95" y="291" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">Client</text>
  <text x="95" y="308" text-anchor="middle" fill="#64748b" font-size="10">API Gateway</text>

  <!-- Service A (with CB) -->
  <rect x="220" y="250" width="130" height="90" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="285" y="274" text-anchor="middle" fill="#38bdf8" font-size="12" font-weight="bold">Service A</text>
  <rect x="235" y="282" width="100" height="22" rx="4" fill="#0f3a4a" stroke="#38bdf8" stroke-width="1"/>
  <text x="285" y="297" text-anchor="middle" fill="#7dd3fc" font-size="10">Circuit Breaker</text>
  <rect x="235" y="308" width="100" height="22" rx="4" fill="#0f3a4a" stroke="#38bdf8" stroke-width="1"/>
  <text x="285" y="323" text-anchor="middle" fill="#7dd3fc" font-size="10">Bulkhead Pool</text>

  <!-- Service B (healthy) -->
  <rect x="460" y="250" width="120" height="55" rx="6" fill="#1a3a2a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="520" y="274" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">Service B</text>
  <text x="520" y="293" text-anchor="middle" fill="#86efac" font-size="10">Healthy ✓</text>

  <!-- Service C (degraded) -->
  <rect x="460" y="325" width="120" height="55" rx="6" fill="#3a1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="520" y="349" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">Service C</text>
  <text x="520" y="368" text-anchor="middle" fill="#fca5a5" font-size="10">Degraded ✗</text>

  <!-- Retry/Fallback box -->
  <rect x="670" y="265" width="160" height="110" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="286" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Fallback</text>
  <text x="750" y="305" text-anchor="middle" fill="#c4b5fd" font-size="10">• Cache response</text>
  <text x="750" y="322" text-anchor="middle" fill="#c4b5fd" font-size="10">• Default value</text>
  <text x="750" y="339" text-anchor="middle" fill="#c4b5fd" font-size="10">• Retry w/ backoff</text>
  <text x="750" y="356" text-anchor="middle" fill="#c4b5fd" font-size="10">• Degraded mode</text>

  <!-- Connections -->
  <line x1="150" y1="295" x2="218" y2="295" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <line x1="350" y1="278" x2="458" y2="278" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green2)"/>
  <text x="404" y="270" text-anchor="middle" fill="#4ade80" font-size="10">CLOSED</text>

  <line x1="350" y1="325" x2="458" y2="355" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrow-red3)"/>
  <text x="404" y="348" text-anchor="middle" fill="#f87171" font-size="10">OPEN (fast fail)</text>

  <line x1="580" y1="355" x2="668" y2="340" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Metrics legend -->
  <rect x="40" y="390" width="820" height="100" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="412" text-anchor="middle" fill="#64748b" font-size="11" font-weight="bold">KEY METRICS TO WATCH</text>
  <text x="120" y="435" text-anchor="middle" fill="#94a3b8" font-size="10">failure_rate_threshold</text>
  <text x="120" y="452" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">50% / 60s window</text>
  <text x="300" y="435" text-anchor="middle" fill="#94a3b8" font-size="10">slow_call_threshold</text>
  <text x="300" y="452" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">100% &gt; 2s</text>
  <text x="480" y="435" text-anchor="middle" fill="#94a3b8" font-size="10">wait_duration_open</text>
  <text x="480" y="452" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">30s - 60s</text>
  <text x="660" y="435" text-anchor="middle" fill="#94a3b8" font-size="10">half_open_calls</text>
  <text x="660" y="452" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">3 - 5 probes</text>
  <text x="820" y="435" text-anchor="middle" fill="#94a3b8" font-size="10">min_call_volume</text>
  <text x="820" y="452" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">10 - 20 calls</text>

  <text x="120" y="475" text-anchor="middle" fill="#64748b" font-size="9">trip threshold</text>
  <text x="300" y="475" text-anchor="middle" fill="#64748b" font-size="9">latency trip</text>
  <text x="480" y="475" text-anchor="middle" fill="#64748b" font-size="9">recovery window</text>
  <text x="660" y="475" text-anchor="middle" fill="#64748b" font-size="9">half-open attempts</text>
  <text x="820" y="475" text-anchor="middle" fill="#64748b" font-size="9">stat window min</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arrow-red2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arrow-red3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-green2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>
</svg>
