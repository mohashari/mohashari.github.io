<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 860" width="1160" height="860" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="1160" height="860" fill="white"/>

  <!-- Title -->
  <text x="580" y="32" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e1e1e">Cooperative Sticky Rebalance vs Eager (Stop-the-World)</text>

  <!-- Group Coordinator -->
  <rect x="440" y="48" width="220" height="48" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="550" y="77" text-anchor="middle" font-size="15" fill="#1e1e1e" font-weight="bold">Group Coordinator (Broker)</text>

  <!-- JoinGroup arrow from C4 to coord -->
  <line x1="900" y1="168" x2="660" y2="96" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="800" y="128" text-anchor="middle" font-size="13" fill="#f59e0b">JoinGroup</text>

  <!-- SyncGroup arrow from coord to C4 -->
  <line x1="660" y1="96" x2="900" y2="168" stroke="#4a9eed" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>
  <text x="760" y="152" text-anchor="middle" font-size="12" fill="#4a9eed">SyncGroup (new assignment)</text>

  <!-- BEFORE label -->
  <text x="30" y="138" font-size="17" font-weight="bold" fill="#555555">BEFORE: 3 consumers, 12 partitions</text>

  <!-- C1 before -->
  <rect x="30" y="148" width="210" height="82" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="135" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e1e1e">Consumer C1</text>
  <text x="135" y="195" text-anchor="middle" font-size="14" fill="#1e1e1e">P0  P1  P2  P3</text>
  <text x="135" y="218" text-anchor="middle" font-size="12" fill="#15803d">processing</text>

  <!-- C2 before -->
  <rect x="260" y="148" width="210" height="82" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="365" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e1e1e">Consumer C2</text>
  <text x="365" y="195" text-anchor="middle" font-size="14" fill="#1e1e1e">P4  P5  P6  P7</text>
  <text x="365" y="218" text-anchor="middle" font-size="12" fill="#15803d">processing</text>

  <!-- C3 before -->
  <rect x="490" y="148" width="220" height="82" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e1e1e">Consumer C3</text>
  <text x="600" y="195" text-anchor="middle" font-size="14" fill="#1e1e1e">P8  P9  P10  P11</text>
  <text x="600" y="218" text-anchor="middle" font-size="12" fill="#15803d">processing</text>

  <!-- C4 joining -->
  <rect x="800" y="148" width="200" height="82" rx="8" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2"/>
  <text x="900" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e1e1e">Consumer C4</text>
  <text x="900" y="198" text-anchor="middle" font-size="15" fill="#c2410c" font-weight="bold">JOINING</text>
  <text x="900" y="220" text-anchor="middle" font-size="12" fill="#92400e">triggers rebalance</text>

  <!-- Divider -->
  <line x1="30" y1="258" x2="1130" y2="258" stroke="#e0e0e0" stroke-width="1"/>

  <!-- EAGER section -->
  <text x="30" y="284" font-size="17" font-weight="bold" fill="#ef4444">EAGER rebalance (stop-the-world):</text>

  <rect x="30" y="294" width="200" height="68" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="130" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">C1 — STOPPED</text>
  <text x="130" y="338" text-anchor="middle" font-size="13" fill="#991b1b">all partitions revoked</text>
  <text x="130" y="356" text-anchor="middle" font-size="12" fill="#991b1b">P0 P1 P2 P3</text>

  <rect x="250" y="294" width="200" height="68" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="350" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">C2 — STOPPED</text>
  <text x="350" y="338" text-anchor="middle" font-size="13" fill="#991b1b">all partitions revoked</text>
  <text x="350" y="356" text-anchor="middle" font-size="12" fill="#991b1b">P4 P5 P6 P7</text>

  <rect x="470" y="294" width="200" height="68" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="570" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">C3 — STOPPED</text>
  <text x="570" y="338" text-anchor="middle" font-size="13" fill="#991b1b">all partitions revoked</text>
  <text x="570" y="356" text-anchor="middle" font-size="12" fill="#991b1b">P8 P9 P10 P11</text>

  <rect x="700" y="294" width="260" height="68" rx="8" fill="#fff0f0" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="830" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444">ALL 12 partitions dark</text>
  <text x="830" y="338" text-anchor="middle" font-size="13" fill="#991b1b">during rebalance window</text>
  <text x="830" y="356" text-anchor="middle" font-size="13" fill="#991b1b">100% downtime</text>

  <!-- Divider -->
  <line x1="30" y1="388" x2="1130" y2="388" stroke="#e0e0e0" stroke-width="1"/>

  <!-- COOPERATIVE section -->
  <text x="30" y="413" font-size="17" font-weight="bold" fill="#22c55e">COOPERATIVE STICKY rebalance (incremental):</text>

  <!-- Still processing boxes -->
  <rect x="30" y="423" width="195" height="82" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="127" y="447" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C1 keeps P0,P1,P2</text>
  <text x="127" y="467" text-anchor="middle" font-size="13" fill="#15803d">still processing</text>
  <text x="127" y="485" text-anchor="middle" font-size="13" fill="#15803d">no interruption</text>
  <text x="127" y="497" text-anchor="middle" font-size="12" fill="#991b1b">P3 revoked</text>

  <rect x="245" y="423" width="195" height="82" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="342" y="447" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C2 keeps P4,P5,P6</text>
  <text x="342" y="467" text-anchor="middle" font-size="13" fill="#15803d">still processing</text>
  <text x="342" y="485" text-anchor="middle" font-size="13" fill="#15803d">no interruption</text>
  <text x="342" y="497" text-anchor="middle" font-size="12" fill="#991b1b">P7 revoked</text>

  <rect x="460" y="423" width="210" height="82" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="565" y="447" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C3 keeps P8,P9,P10</text>
  <text x="565" y="467" text-anchor="middle" font-size="13" fill="#15803d">still processing</text>
  <text x="565" y="485" text-anchor="middle" font-size="13" fill="#15803d">no interruption</text>
  <text x="565" y="497" text-anchor="middle" font-size="12" fill="#991b1b">P11 revoked</text>

  <!-- Revoked box -->
  <rect x="700" y="423" width="175" height="82" rx="8" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="787" y="447" text-anchor="middle" font-size="15" font-weight="bold" fill="#ef4444">P3, P7, P11</text>
  <text x="787" y="467" text-anchor="middle" font-size="13" fill="#991b1b">revoked only</text>
  <text x="787" y="487" text-anchor="middle" font-size="12" fill="#991b1b">3 of 12 partitions</text>
  <text x="787" y="501" text-anchor="middle" font-size="12" fill="#991b1b">brief handoff gap</text>

  <line x1="700" y1="464" x2="671" y2="464" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="685" y="458" text-anchor="middle" font-size="11" fill="#ef4444">only</text>
  <text x="685" y="470" text-anchor="middle" font-size="11" fill="#ef4444">these</text>

  <!-- Divider -->
  <line x1="30" y1="528" x2="1130" y2="528" stroke="#e0e0e0" stroke-width="1"/>

  <!-- AFTER label -->
  <text x="30" y="553" font-size="17" font-weight="bold" fill="#555555">AFTER: C4 assigned only the revoked partitions</text>

  <rect x="30" y="563" width="180" height="68" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="120" y="586" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C1: P0, P1, P2</text>
  <text x="120" y="606" text-anchor="middle" font-size="13" fill="#15803d">unchanged</text>
  <text x="120" y="622" text-anchor="middle" font-size="12" fill="#15803d">sticky assignment</text>

  <rect x="230" y="563" width="180" height="68" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="586" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C2: P4, P5, P6</text>
  <text x="320" y="606" text-anchor="middle" font-size="13" fill="#15803d">unchanged</text>
  <text x="320" y="622" text-anchor="middle" font-size="12" fill="#15803d">sticky assignment</text>

  <rect x="430" y="563" width="190" height="68" rx="8" fill="#b2f2bb" stroke="#22c55e" stroke-width="2"/>
  <text x="525" y="586" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C3: P8, P9, P10</text>
  <text x="525" y="606" text-anchor="middle" font-size="13" fill="#15803d">unchanged</text>
  <text x="525" y="622" text-anchor="middle" font-size="12" fill="#15803d">sticky assignment</text>

  <rect x="640" y="563" width="220" height="68" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="750" y="586" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1e1e">C4: P3, P7, P11</text>
  <text x="750" y="606" text-anchor="middle" font-size="13" fill="#1d4ed8">newly assigned</text>
  <text x="750" y="622" text-anchor="middle" font-size="12" fill="#1d4ed8">from revoked set</text>

  <!-- Summary box -->
  <rect x="30" y="658" width="1100" height="78" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="580" y="681" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">Key insight: 9 of 12 partitions never stop processing. Only P3, P7, P11 have a brief handoff gap.</text>
  <text x="580" y="704" text-anchor="middle" font-size="15" fill="#92400e">Eager: 100% downtime during rebalance.  Cooperative Sticky: ~25% downtime — only revoked partitions affected.</text>
  <text x="580" y="724" text-anchor="middle" font-size="14" fill="#92400e">With 100 partitions across 10 consumers: losing 1 consumer revokes only 10 partitions, not all 100.</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eed"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
