  </g>
  <text x="90" y="310" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Pod A</text>
  
  <g filter="url(#rough)">
    <rect x="155" y="285" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="205" y="310" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Pod B</text>
  
  <g filter="url(#rough)">
    <rect x="300" y="275" width="230" height="100" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="415" y="330" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Node 2</text>
  
  <g filter="url(#rough)">
    <rect x="300" y="285" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="350" y="310" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Pod C</text>
  
  <g filter="url(#rough)">
    <rect x="415" y="285" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="465" y="310" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Pod D</text>
  
  <g filter="url(#rough)">
    <rect x="560" y="275" width="220" height="100" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="670" y="330" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Node 3</text>
  
  <g filter="url(#rough)">
    <rect x="565" y="285" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="615" y="310" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Pod E</text>
  
  <g filter="url(#rough)">
    <rect x="670" y="285" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="720" y="310" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Pod F</text>
  
  <g filter="url(#rough)">
    <rect x="530" y="90" width="110" height="50" rx="6" ry="6"
          fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="585" y="120" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">kubectl</text>
  
  <line x1="530" y1="115" x2="172" y2="115"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="312.5" y="103" width="85" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="351" y="117" text-anchor="middle" font-size="11" fill="#6b7280">apply / get</text>
  <line x1="172" y1="108" x2="198" y2="108"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="172" y1="122" x2="328" y2="122"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="105" y1="140" x2="105" y2="158"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="105" y1="210" x2="155" y2="273"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="102" y="229.5" width="64" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="130" y="243.5" text-anchor="middle" font-size="11" fill="#6b7280">schedule</text></svg>