<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="420" viewBox="0 0 820 420"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="420" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">Kubernetes Cluster Architecture</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="60" width="460" height="160" rx="8" ry="8"
          fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="30" y="50" width="120" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="38" y="65" font-size="12" fill="#1d4ed8"
        font-weight="600">Control Plane</text>
  <g filter="url(#rough)">
    <rect x="40" y="90" width="130" height="50" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="105" y="120" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">API Server</text>
  
  <g filter="url(#rough)">
    <rect x="200" y="90" width="110" height="50" rx="6" ry="6"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="255" y="107" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">etcd</text>
  <text x="255" y="129" text-anchor="middle"
        font-size="11" fill="#7c2d12" opacity="0.7">cluster state</text>
  <g filter="url(#rough)">
    <rect x="330" y="90" width="130" height="50" rx="6" ry="6"
          fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  </g>
  <text x="395" y="120" text-anchor="middle"
        font-size="14" font-weight="600" fill="#4c1d95">Scheduler</text>
  
  <g filter="url(#rough)">
    <rect x="40" y="160" width="160" height="50" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="120" y="190" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">Controller Mgr</text>
  
  <g filter="url(#rough)">
    <rect x="220" y="160" width="240" height="50" rx="6" ry="6"
