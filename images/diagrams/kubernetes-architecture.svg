          opacity="0.6"/>
  </g>
  <rect x="30" y="240" width="112" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="38" y="255" font-size="12" fill="#065f46"
        font-weight="600">Worker Nodes</text>
  <g filter="url(#rough)">
    <rect x="40" y="275" width="230" height="100" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="155" y="330" text-anchor="middle"
