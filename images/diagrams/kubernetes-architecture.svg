  </g>
  <text x="340" y="190" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1f2937">Cloud Controller</text>
  
  <g filter="url(#rough)">
    <rect x="20" y="250" width="770" height="150" rx="8" ry="8"
