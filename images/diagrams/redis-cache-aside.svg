<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="390" viewBox="0 0 820 390"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="390" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">Redis Cache-Aside Pattern</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="160" width="110" height="60" rx="6" ry="6"
          fill="#ffffff" stroke="#1e1e2e" stroke-width="2"/>
  </g>
  <text x="75" y="182" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e1e2e">Application</text>
  <text x="75" y="204" text-anchor="middle"
        font-size="11" fill="#1e1e2e" opacity="0.7">API Handler</text>
  <g filter="url(#rough)">
    <path d="M 230 90
             a 55 10 0 0 1 110 0
             l 0 60
             a 55 10 0 0 1 -110 0
             Z"
          fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
    <ellipse cx="285" cy="90" rx="55" ry="10"
             fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  </g>
  <text x="285" y="125" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7f1d1d">Redis Cache</text><text x="285" y="165" text-anchor="middle"
               font-size="10" fill="#991b1b">TTL: 15 min</text>
  <g filter="url(#rough)">
    <polygon points="285,200 340,235 285,270 230,235"
             fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="285" y="240" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7c2d12">Cache Hit?</text>
  <g filter="url(#rough)">
    <path d="M 450 210
             a 60 10 0 0 1 120 0
             l 0 60
             a 60 10 0 0 1 -120 0
             Z"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
    <ellipse cx="510" cy="210" rx="60" ry="10"
             fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="510" y="245" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7c2d12">PostgreSQL</text>
  <line x1="130" y1="190" x2="228" y2="200"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="154.5" y="183" width="57" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="179" y="197" text-anchor="middle" font-size="11" fill="#6b7280">GET key</text>
  <line x1="130" y1="190" x2="228" y2="100"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="228" y1="235" x2="128" y2="220"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="136" y="215.5" width="92" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="178" y="229.5" text-anchor="middle" font-size="11" fill="#6b7280">HIT → return</text><path d="M 228 235 L 128 220" stroke="#065f46" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="342" y1="235" x2="448" y2="235"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="342.5" y="223" width="113" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="395" y="237" text-anchor="middle" font-size="11" fill="#6b7280">MISS → query DB</text>
  <path d="M 450 200 Q 395 187.5 340 115"
        fill="none" stroke="#374151" stroke-width="1.8"
        marker-end="url(#arr)"/>
  <text x="395" y="181.5" text-anchor="middle" font-size="11" fill="#6b7280">SET key + TTL</text>
  <path d="M 450 270 Q 290 185 130 220"
        fill="none" stroke="#374151" stroke-width="1.8"
        marker-end="url(#arr)"/>
  <text x="290" y="179" text-anchor="middle" font-size="11" fill="#6b7280">return data</text>
  <g filter="url(#rough)">
    <rect x="560" y="60" width="240" height="130" rx="8" ry="8"
          fill="none" stroke="#5b21b6" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="570" y="50" width="168" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="578" y="65" font-size="12" fill="#5b21b6"
        font-weight="600">Stampede Protection</text>
  <g filter="url(#rough)">
    <rect x="575" y="90" width="210" height="40" rx="6" ry="6"
          fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  </g>
  <text x="680" y="115" text-anchor="middle"
        font-size="14" font-weight="600" fill="#4c1d95">Mutex Lock (Redis SETNX)</text>
  
  <g filter="url(#rough)">
    <rect x="575" y="145" width="210" height="40" rx="6" ry="6"
          fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  </g>
  <text x="680" y="170" text-anchor="middle"
        font-size="14" font-weight="600" fill="#4c1d95">Probabilistic Early Expiry</text>
  
  <g filter="url(#rough)">
    <rect x="560" y="210" width="240" height="130" rx="8" ry="8"
          fill="none" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="570" y="200" width="128" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="578" y="215" font-size="12" fill="#0f766e"
        font-weight="600">Target Metrics</text><text x="680" y="250" text-anchor="middle"
               font-size="13" fill="#134e4a">Hit Rate &gt; 90%</text><text x="680" y="280" text-anchor="middle"
               font-size="13" fill="#134e4a">Latency &lt; 1ms</text><text x="680" y="310" text-anchor="middle"
               font-size="13" fill="#134e4a">Memory &lt; 80%</text></svg>