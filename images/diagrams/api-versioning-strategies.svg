<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="monospace, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="900" height="560" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold">API Versioning Lifecycle: Request Routing → Deprecation Signals → Sunset</text>

  <!-- CLIENT box -->
  <rect x="30" y="65" width="120" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="86" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">CLIENT</text>
  <text x="90" y="103" text-anchor="middle" fill="#64748b" font-size="11">Any version</text>

  <!-- Arrow: client to gateway -->
  <line x1="150" y1="90" x2="210" y2="90" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="180" y="82" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP</text>

  <!-- GATEWAY box -->
  <rect x="210" y="65" width="150" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="285" y="86" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">API GATEWAY</text>
  <text x="285" y="103" text-anchor="middle" fill="#64748b" font-size="11">Version Router</text>

  <!-- Arrow: gateway to v1 -->
  <line x1="285" y1="115" x2="285" y2="170" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Arrow: gateway to v2 -->
  <line x1="360" y1="90" x2="470" y2="90" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="470" y1="90" x2="470" y2="130" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Arrow: gateway to v3 -->
  <line x1="360" y1="90" x2="630" y2="90" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="630" y1="90" x2="630" y2="130" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- V1 box - DEPRECATED -->
  <rect x="195" y="170" width="180" height="60" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="285" y="193" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">/api/v1/*</text>
  <text x="285" y="210" text-anchor="middle" fill="#ef4444" font-size="11">DEPRECATED</text>
  <text x="285" y="224" text-anchor="middle" fill="#64748b" font-size="10">Sunset: 2026-09-01</text>

  <!-- V2 box - STABLE -->
  <rect x="380" y="130" width="180" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="470" y="153" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">/api/v2/*</text>
  <text x="470" y="170" text-anchor="middle" fill="#f59e0b" font-size="11">STABLE (LTS)</text>
  <text x="470" y="184" text-anchor="middle" fill="#64748b" font-size="10">Sunset: 2027-03-01</text>

  <!-- V3 box - CURRENT -->
  <rect x="540" y="130" width="180" height="60" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="630" y="153" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">/api/v3/*</text>
  <text x="630" y="170" text-anchor="middle" fill="#22c55e" font-size="11">CURRENT</text>
  <text x="630" y="184" text-anchor="middle" fill="#64748b" font-size="10">No sunset yet</text>

  <!-- DEPRECATION HEADERS section -->
  <rect x="30" y="270" width="840" height="110" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="450" y="292" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">DEPRECATION RESPONSE HEADERS (injected at gateway on v1 and v2)</text>

  <rect x="50" y="302" width="380" height="65" rx="6" fill="#0f1117" stroke="#334155" stroke-width="1"/>
  <text x="240" y="320" text-anchor="middle" fill="#86efac" font-size="11">Deprecation: true</text>
  <text x="240" y="337" text-anchor="middle" fill="#86efac" font-size="11">Sunset: Mon, 01 Sep 2026 00:00:00 GMT</text>
  <text x="240" y="354" text-anchor="middle" fill="#86efac" font-size="11">Link: &lt;/api/v3/docs&gt;; rel="successor-version"</text>

  <rect x="460" y="302" width="380" height="65" rx="6" fill="#0f1117" stroke="#334155" stroke-width="1"/>
  <text x="650" y="320" text-anchor="middle" fill="#fcd34d" font-size="11">Deprecation: 2026-03-01T00:00:00Z</text>
  <text x="650" y="337" text-anchor="middle" fill="#fcd34d" font-size="11">Sunset: Sat, 01 Mar 2027 00:00:00 GMT</text>
  <text x="650" y="354" text-anchor="middle" fill="#fcd34d" font-size="11">Link: &lt;/api/v3/docs&gt;; rel="successor-version"</text>

  <text x="240" y="375" text-anchor="middle" fill="#ef4444" font-size="10">v1 response (6-month window)</text>
  <text x="650" y="375" text-anchor="middle" fill="#f59e0b" font-size="10">v2 response (12-month LTS window)</text>

  <!-- CONSUMER CONTRACT TESTING section -->
  <rect x="30" y="400" width="400" height="130" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="230" y="422" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">CONSUMER-DRIVEN CONTRACT TESTING</text>
  <rect x="50" y="432" width="160" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="450" text-anchor="middle" fill="#93c5fd" font-size="11">Consumer</text>
  <text x="130" y="465" text-anchor="middle" fill="#64748b" font-size="10">publishes pact</text>
  <line x1="210" y1="452" x2="250" y2="452" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="250" y="432" width="160" height="40" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="330" y="450" text-anchor="middle" fill="#86efac" font-size="11">Pact Broker</text>
  <text x="330" y="465" text-anchor="middle" fill="#64748b" font-size="10">verifies provider</text>
  <text x="230" y="490" text-anchor="middle" fill="#64748b" font-size="10">blocks deploy if contract broken across versions</text>
  <text x="230" y="506" text-anchor="middle" fill="#64748b" font-size="10">can-i-deploy gate on CI before v1 sunset</text>
  <text x="230" y="522" text-anchor="middle" fill="#64748b" font-size="10">consumer migration tracked per pact tag</text>

  <!-- SUNSET POLICY section -->
  <rect x="460" y="400" width="410" height="130" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="665" y="422" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="bold">VERSION SUNSET POLICY</text>
  <text x="480" y="442" fill="#e2e8f0" font-size="11">Day 0:   Announce sunset date (6+ months)</text>
  <text x="480" y="460" fill="#e2e8f0" font-size="11">Day 1:   Inject Deprecation + Sunset headers</text>
  <text x="480" y="478" fill="#e2e8f0" font-size="11">-30d:    Email all registered consumers</text>
  <text x="480" y="496" fill="#e2e8f0" font-size="11">-7d:     429 + warning on every v1 request</text>
  <text x="480" y="514" fill="#e2e8f0" font-size="11">Day T:   Return 410 Gone (permanent)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>
