<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="monospace, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Runbook Automation: Alert to Remediation Flow</text>

  <!-- Zone: Alerting -->
  <rect x="20" y="60" width="160" height="390" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="100" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#3949ab">ALERTING</text>

  <rect x="35" y="92" width="130" height="44" rx="6" fill="#5c6bc0" stroke="#3949ab" stroke-width="1"/>
  <text x="100" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PagerDuty</text>
  <text x="100" y="126" text-anchor="middle" font-size="10" fill="#c5cae9">Alert + Context</text>

  <rect x="35" y="152" width="130" height="44" rx="6" fill="#5c6bc0" stroke="#3949ab" stroke-width="1"/>
  <text x="100" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Prometheus</text>
  <text x="100" y="186" text-anchor="middle" font-size="10" fill="#c5cae9">Threshold Breach</text>

  <rect x="35" y="212" width="130" height="44" rx="6" fill="#5c6bc0" stroke="#3949ab" stroke-width="1"/>
  <text x="100" y="229" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Datadog / OpsGenie</text>
  <text x="100" y="246" text-anchor="middle" font-size="10" fill="#c5cae9">Anomaly Detection</text>

  <!-- Arrow: Alerting → Runbook Engine -->
  <line x1="182" y1="188" x2="238" y2="188" stroke="#3949ab" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="210" y="182" text-anchor="middle" font-size="9" fill="#3949ab">webhook</text>

  <!-- Zone: Runbook Engine -->
  <rect x="240" y="60" width="200" height="390" rx="8" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="340" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">RUNBOOK ENGINE</text>

  <rect x="258" y="92" width="164" height="50" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="1"/>
  <text x="340" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Triage Step</text>
  <text x="340" y="129" text-anchor="middle" font-size="10" fill="#c8e6c9">classify + enrich alert</text>

  <line x1="340" y1="142" x2="340" y2="160" stroke="#43a047" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="258" y="162" width="164" height="50" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="1"/>
  <text x="340" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Conditional Logic</text>
  <text x="340" y="199" text-anchor="middle" font-size="10" fill="#c8e6c9">severity / service match</text>

  <line x1="340" y1="212" x2="340" y2="230" stroke="#43a047" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="258" y="232" width="164" height="50" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="1"/>
  <text x="340" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Remediation Steps</text>
  <text x="340" y="269" text-anchor="middle" font-size="10" fill="#c8e6c9">ordered + idempotent</text>

  <line x1="340" y1="282" x2="340" y2="300" stroke="#43a047" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="258" y="302" width="164" height="50" rx="6" fill="#43a047" stroke="#2e7d32" stroke-width="1"/>
  <text x="340" y="322" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Rollback Guard</text>
  <text x="340" y="339" text-anchor="middle" font-size="10" fill="#c8e6c9">verify → abort if unsafe</text>

  <!-- Arrow: Runbook Engine → Execution -->
  <line x1="440" y1="258" x2="496" y2="258" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="468" y="252" text-anchor="middle" font-size="9" fill="#2e7d32">execute</text>

  <!-- Zone: Execution Targets -->
  <rect x="498" y="60" width="180" height="390" rx="8" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="588" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">EXECUTION</text>

  <rect x="514" y="92" width="148" height="44" rx="6" fill="#fb8c00" stroke="#e65100" stroke-width="1"/>
  <text x="588" y="109" text-anchor="middle" font-size="11" font-weight="bold" fill="white">K8s / Helm</text>
  <text x="588" y="126" text-anchor="middle" font-size="10" fill="#fff8e1">scale / restart / rollout</text>

  <rect x="514" y="152" width="148" height="44" rx="6" fill="#fb8c00" stroke="#e65100" stroke-width="1"/>
  <text x="588" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Shell / Ansible</text>
  <text x="588" y="186" text-anchor="middle" font-size="10" fill="#fff8e1">custom scripts</text>

  <rect x="514" y="212" width="148" height="44" rx="6" fill="#fb8c00" stroke="#e65100" stroke-width="1"/>
  <text x="588" y="229" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AWS / GCP APIs</text>
  <text x="588" y="246" text-anchor="middle" font-size="10" fill="#fff8e1">infra mutations</text>

  <rect x="514" y="272" width="148" height="44" rx="6" fill="#fb8c00" stroke="#e65100" stroke-width="1"/>
  <text x="588" y="289" text-anchor="middle" font-size="11" font-weight="bold" fill="white">DB / Cache Ops</text>
  <text x="588" y="306" text-anchor="middle" font-size="10" fill="#fff8e1">flush / resize / failover</text>

  <!-- Arrow: Execution → Audit + Notify -->
  <line x1="678" y1="258" x2="730" y2="258" stroke="#fb8c00" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Zone: Audit + Notify -->
  <rect x="732" y="60" width="148" height="390" rx="8" fill="#fce4ec" stroke="#e53935" stroke-width="1.5"/>
  <text x="806" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#b71c1c">AUDIT + NOTIFY</text>

  <rect x="748" y="92" width="116" height="44" rx="6" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="806" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Audit Log</text>
  <text x="806" y="126" text-anchor="middle" font-size="10" fill="#ffcdd2">who/what/when/result</text>

  <rect x="748" y="152" width="116" height="44" rx="6" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="806" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Slack / Teams</text>
  <text x="806" y="186" text-anchor="middle" font-size="10" fill="#ffcdd2">step-by-step updates</text>

  <rect x="748" y="212" width="116" height="44" rx="6" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="806" y="229" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PD Resolve</text>
  <text x="806" y="246" text-anchor="middle" font-size="10" fill="#ffcdd2">auto-resolve on success</text>

  <rect x="748" y="272" width="116" height="44" rx="6" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="806" y="289" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Escalate</text>
  <text x="806" y="306" text-anchor="middle" font-size="10" fill="#ffcdd2">on failure / timeout</text>

  <!-- Rollback arrow (back from Execution to Engine) -->
  <path d="M 588 316 Q 588 380 340 380 Q 258 380 258 352" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="460" y="398" text-anchor="middle" font-size="10" fill="#6a1b9a">rollback path</text>

  <!-- Defs for arrowheads -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3949ab"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#43a047"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb8c00"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6a1b9a"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="20" y="462" width="860" height="46" rx="6" fill="#eceff1" stroke="#b0bec5" stroke-width="1"/>
  <text x="36" y="480" font-size="11" fill="#37474f" font-weight="bold">Flow:</text>
  <text x="80" y="480" font-size="11" fill="#37474f">Alert fires → Runbook Engine classifies → Conditional steps execute in order → Results logged + team notified</text>
  <text x="36" y="498" font-size="10" fill="#6a1b9a">--- Rollback path triggers if any step exits non-zero or post-check fails</text>
</svg>
