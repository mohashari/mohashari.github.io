<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="960" height="520" fill="#f8f9fa" rx="12"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Rate Limiting Algorithms: Request Flow Comparison</text>
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="290" height="410" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="290" height="36" rx="10" fill="#3b82f6"/>
    <rect x="0" y="26" width="290" height="10" fill="#3b82f6"/>
    <text x="145" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Token Bucket</text>
    <rect x="100" y="58" width="90" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="145" y="75" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Refill Rate</text>
    <text x="145" y="88" text-anchor="middle" font-size="10" fill="#3b82f6">+10 tokens/sec</text>
    <line x1="145" y1="92" x2="145" y2="115" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="145,117 141,109 149,109" fill="#3b82f6"/>
    <path d="M90,117 L200,117 L190,220 L100,220 Z" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="120" cy="147" r="8" fill="#3b82f6" opacity="0.8"/>
    <circle cx="145" cy="142" r="8" fill="#3b82f6" opacity="0.8"/>
    <circle cx="170" cy="147" r="8" fill="#3b82f6" opacity="0.8"/>
    <circle cx="130" cy="165" r="8" fill="#3b82f6" opacity="0.8"/>
    <circle cx="158" cy="165" r="8" fill="#3b82f6" opacity="0.8"/>
    <circle cx="145" cy="184" r="8" fill="#3b82f6" opacity="0.5"/>
    <text x="145" y="235" text-anchor="middle" font-size="10" fill="#64748b">capacity: 100 tokens</text>
    <text x="145" y="262" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">Request arrives</text>
    <polygon points="145,272 175,292 145,312 115,292" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="145" y="289" text-anchor="middle" font-size="10" fill="#92400e">tokens</text>
    <text x="145" y="302" text-anchor="middle" font-size="10" fill="#92400e">&gt; 0?</text>
    <line x1="175" y1="292" x2="218" y2="292" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="220,292 212,288 212,296" fill="#10b981"/>
    <rect x="220" y="277" width="58" height="30" rx="5" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="249" y="293" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">ALLOW</text>
    <text x="249" y="305" text-anchor="middle" font-size="9" fill="#059669">-1 token</text>
    <line x1="145" y1="312" x2="145" y2="342" stroke="#ef4444" stroke-width="1.5"/>
    <polygon points="145,344 141,336 149,336" fill="#ef4444"/>
    <rect x="108" y="344" width="74" height="26" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="145" y="362" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="600">REJECT (429)</text>
    <rect x="10" y="385" width="270" height="18" rx="4" fill="#eff6ff"/>
    <text x="145" y="398" text-anchor="middle" font-size="10" fill="#1d4ed8">Allows bursts up to capacity</text>
  </g>
  <g transform="translate(335, 60)">
    <rect x="0" y="0" width="290" height="410" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="290" height="36" rx="10" fill="#8b5cf6"/>
    <rect x="0" y="26" width="290" height="10" fill="#8b5cf6"/>
    <text x="145" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Leaky Bucket (Queue)</text>
    <rect x="60" y="58" width="170" height="28" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="145" y="76" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">Incoming Requests (bursty)</text>
    <line x1="145" y1="90" x2="145" y2="112" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="145,114 141,106 149,106" fill="#8b5cf6"/>
    <rect x="65" y="114" width="160" height="80" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="145" y="132" text-anchor="middle" font-size="10" fill="#5b21b6" font-weight="600">FIFO Queue</text>
    <rect x="75" y="138" width="28" height="16" rx="3" fill="#8b5cf6" opacity="0.9"/>
    <rect x="109" y="138" width="28" height="16" rx="3" fill="#8b5cf6" opacity="0.7"/>
    <rect x="143" y="138" width="28" height="16" rx="3" fill="#8b5cf6" opacity="0.5"/>
    <rect x="177" y="138" width="28" height="16" rx="3" fill="#8b5cf6" opacity="0.3"/>
    <text x="145" y="172" text-anchor="middle" font-size="10" fill="#5b21b6">max_size: 1000</text>
    <text x="145" y="185" text-anchor="middle" font-size="9" fill="#7c3aed">overflow: drop / 503</text>
    <line x1="145" y1="198" x2="145" y2="220" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="145,222 141,214 149,214" fill="#8b5cf6"/>
    <rect x="85" y="222" width="120" height="32" rx="6" fill="#ddd6fe" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="145" y="238" text-anchor="middle" font-size="11" fill="#4c1d95" font-weight="600">Rate Processor</text>
    <text x="145" y="251" text-anchor="middle" font-size="10" fill="#6d28d9">constant: 100 req/sec</text>
    <line x1="145" y1="258" x2="145" y2="278" stroke="#8b5cf6" stroke-width="2"/>
    <polygon points="145,280 141,272 149,272" fill="#8b5cf6"/>
    <rect x="75" y="280" width="140" height="30" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
    <text x="145" y="296" text-anchor="middle" font-size="11" fill="#065f46" font-weight="600">Downstream Service</text>
    <text x="145" y="309" text-anchor="middle" font-size="9" fill="#059669">smooth, predictable load</text>
    <rect x="10" y="328" width="270" height="36" rx="4" fill="#f5f3ff"/>
    <text x="145" y="346" text-anchor="middle" font-size="10" fill="#4c1d95">Smooth output rate</text>
    <text x="145" y="360" text-anchor="middle" font-size="10" fill="#6d28d9">Cannot burst, adds queue latency</text>
    <rect x="10" y="378" width="270" height="18" rx="4" fill="#eff6ff"/>
    <text x="145" y="391" text-anchor="middle" font-size="10" fill="#1d4ed8">Best for: protecting downstream services</text>
  </g>
  <g transform="translate(650, 60)">
    <rect x="0" y="0" width="290" height="410" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="0" y="0" width="290" height="36" rx="10" fill="#10b981"/>
    <rect x="0" y="26" width="290" height="10" fill="#10b981"/>
    <text x="145" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Sliding Window Counter</text>
    <text x="145" y="65" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">Time</text>
    <line x1="20" y1="72" x2="270" y2="72" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="272,72 264,68 264,76" fill="#94a3b8"/>
    <rect x="25" y="82" width="100" height="50" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="75" y="105" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">prev window</text>
    <text x="75" y="119" text-anchor="middle" font-size="11" fill="#059669" font-weight="700">40 reqs</text>
    <rect x="125" y="82" width="100" height="50" rx="4" fill="#a7f3d0" stroke="#10b981" stroke-width="2"/>
    <text x="175" y="105" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">curr window</text>
    <text x="175" y="119" text-anchor="middle" font-size="11" fill="#059669" font-weight="700">60 reqs</text>
    <rect x="75" y="75" width="100" height="64" rx="4" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="125" y="152" text-anchor="middle" font-size="10" fill="#d97706" font-weight="600">sliding window (60s)</text>
    <rect x="15" y="165" width="260" height="44" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="145" y="183" text-anchor="middle" font-size="10" fill="#065f46" font-weight="600">Weighted Count Formula:</text>
    <text x="145" y="199" text-anchor="middle" font-size="10" fill="#059669" font-family="monospace">count = prev*(1-t/60) + curr</text>
    <rect x="15" y="218" width="260" height="52" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="145" y="235" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">Example: t=45s into window</text>
    <text x="145" y="250" text-anchor="middle" font-size="10" fill="#374151" font-family="monospace">= 40*(1-45/60) + 60</text>
    <text x="145" y="263" text-anchor="middle" font-size="10" fill="#065f46" font-weight="700" font-family="monospace">= 10 + 60 = 70 reqs</text>
    <rect x="15" y="280" width="260" height="52" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="145" y="297" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">Redis Storage (per user key):</text>
    <text x="145" y="312" text-anchor="middle" font-size="10" fill="#c2410c" font-family="monospace">HASH user:123:ratelimit</text>
    <text x="145" y="326" text-anchor="middle" font-size="10" fill="#9a3412" font-family="monospace">  window_ts: count</text>
    <rect x="10" y="346" width="270" height="30" rx="4" fill="#f0fdf4"/>
    <text x="145" y="361" text-anchor="middle" font-size="10" fill="#065f46">No boundary burst spikes</text>
    <text x="145" y="375" text-anchor="middle" font-size="10" fill="#059669">O(1) memory per key (2 counters)</text>
    <rect x="10" y="388" width="270" height="16" rx="4" fill="#eff6ff"/>
    <text x="145" y="400" text-anchor="middle" font-size="10" fill="#1d4ed8">Best for: per-user API quotas</text>
  </g>
  <rect x="20" y="482" width="920" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="50" cy="496" r="6" fill="#3b82f6"/>
  <text x="62" y="500" font-size="11" fill="#374151">Token Bucket: burst-friendly, consumer-side throttle</text>
  <circle cx="340" cy="496" r="6" fill="#8b5cf6"/>
  <text x="352" y="500" font-size="11" fill="#374151">Leaky Bucket: smooth output, queue-backed</text>
  <circle cx="600" cy="496" r="6" fill="#10b981"/>
  <text x="612" y="500" font-size="11" fill="#374151">Sliding Window: precise per-user quotas, Redis-backed</text>
</svg>
