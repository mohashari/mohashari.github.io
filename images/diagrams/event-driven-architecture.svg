<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="430" viewBox="0 0 820 430"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="430" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">Event-Driven Architecture with Outbox Pattern</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="60" width="230" height="170" rx="8" ry="8"
          fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="30" y="50" width="184" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="38" y="65" font-size="12" fill="#1d4ed8"
        font-weight="600">Write Side (Commands)</text>
  <g filter="url(#rough)">
    <rect x="35" y="90" width="200" height="50" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="135" y="120" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">Order Service</text>
  
  <g filter="url(#rough)">
    <path d="M 35 175
             a 100 10 0 0 1 200 0
             l 0 45
             a 100 10 0 0 1 -200 0
             Z"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
    <ellipse cx="135" cy="175" rx="100" ry="10"
             fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="135" y="202.5" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7c2d12">Orders DB + Outbox</text>
  <g filter="url(#rough)">
    <rect x="300" y="155" width="130" height="50" rx="6" ry="6"
          fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="365" y="172" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">Outbox
Processor</text>
  <text x="365" y="194" text-anchor="middle"
        font-size="11" fill="#7c2d12" opacity="0.7">polls every 100ms</text>
  <g filter="url(#rough)">
    <rect x="490" y="155" width="120" height="50" rx="6" ry="6"
          fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="550" y="172" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">Event Bus</text>
  <text x="550" y="194" text-anchor="middle"
        font-size="11" fill="#7c2d12" opacity="0.7">Kafka</text>
  <g filter="url(#rough)">
    <rect x="670" y="60" width="140" height="350" rx="8" ry="8"
          fill="none" stroke="#065f46" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="680" y="50" width="88" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="688" y="65" font-size="12" fill="#065f46"
        font-weight="600">Read Side</text>
  <g filter="url(#rough)">
    <rect x="680" y="90" width="120" height="50" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="740" y="120" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Payment Svc</text>
  
  <g filter="url(#rough)">
    <rect x="680" y="160" width="120" height="50" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="740" y="190" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">Inventory Svc</text>
  
  <g filter="url(#rough)">
    <rect x="680" y="230" width="120" height="50" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="740" y="260" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Email Svc</text>
  
  <g filter="url(#rough)">
    <rect x="680" y="300" width="120" height="50" rx="6" ry="6"
          fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  </g>
  <text x="740" y="330" text-anchor="middle"
        font-size="14" font-weight="600" fill="#4c1d95">Analytics</text>
  
  <line x1="135" y1="90" x2="135" y2="163"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="128" y="114.5" width="22" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="135" y="128.5" text-anchor="middle" font-size="11" fill="#6b7280">TX</text>
  <line x1="237" y1="190" x2="298" y2="180"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="225.5" y="173" width="92" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="267.5" y="187" text-anchor="middle" font-size="11" fill="#6b7280">poll pending</text>
  <line x1="430" y1="180" x2="488" y2="180"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="434.5" y="168" width="57" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="459" y="182" text-anchor="middle" font-size="11" fill="#6b7280">publish</text>
  <line x1="610" y1="180" x2="678" y2="115"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="610" y1="180" x2="678" y2="185"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="610" y1="180" x2="678" y2="255"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="610" y1="180" x2="678" y2="325"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <g filter="url(#rough)">
    <rect x="480" y="330" width="120" height="45" rx="6" ry="6"
          fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  </g>
  <text x="540" y="357.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7f1d1d">Dead Letter
Queue</text>
  
  <line x1="490" y1="205" x2="490" y2="328"
        stroke="#374151" stroke-width="1.8" stroke-dasharray="6 4"
        marker-end="url(#arr)"/>
  <rect x="444.5" y="254.5" width="99" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="490" y="268.5" text-anchor="middle" font-size="11" fill="#6b7280">failed events</text><text x="410" y="390" text-anchor="middle"
               font-size="11" fill="#6b7280">At-least-once delivery · consumers must be idempotent</text></svg>