<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="220" viewBox="0 0 820 220"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="220" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">CI/CD Pipeline — GitHub Actions</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="90" width="130" height="60" rx="6" ry="6"
          fill="#ffffff" stroke="#1e1e2e" stroke-width="2"/>
  </g>
  <text x="85" y="125" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e1e2e">Push / PR</text>
  
  <line x1="150" y1="120" x2="180" y2="120"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <g filter="url(#rough)">
    <rect x="160" y="90" width="130" height="60" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="225" y="125" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">Lint &amp; Test</text>
  
  <line x1="290" y1="120" x2="320" y2="120"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <g filter="url(#rough)">
    <rect x="310" y="90" width="130" height="60" rx="6" ry="6"
          fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="375" y="125" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">Build &amp; Scan</text>
  
  <line x1="440" y1="120" x2="470" y2="120"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <g filter="url(#rough)">
    <rect x="460" y="90" width="130" height="60" rx="6" ry="6"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="525" y="125" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">Deploy Staging</text>
  
  <line x1="590" y1="120" x2="620" y2="120"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <g filter="url(#rough)">
    <rect x="620" y="90" width="130" height="60" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="685" y="125" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Deploy Prod</text>
  
  <path d="M 275 90 Q 167.5 140 60 90"
        fill="none" stroke="#374151" stroke-width="1.8"
        marker-end="url(#arr)"/>
  <text x="167.5" y="134" text-anchor="middle" font-size="11" fill="#6b7280">fail → fix</text><text x="410" y="185" text-anchor="middle"
               font-size="11" fill="#6b7280">main branch always deployable · feature branches run CI only</text></svg>