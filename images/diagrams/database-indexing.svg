<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="400" viewBox="0 0 820 400"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="400" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">B-Tree Index vs Full Table Scan</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="60" width="350" height="300" rx="8" ry="8"
          fill="none" stroke="#991b1b" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="30" y="50" width="256" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="38" y="65" font-size="12" fill="#991b1b"
        font-weight="600">Without Index: Full Table Scan</text>
  <g filter="url(#rough)">
    <rect x="35" y="90" width="320" height="40" rx="6" ry="6"
          fill="#ffffff" stroke="#1e1e2e" stroke-width="2"/>
  </g>
  <text x="195" y="115" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e1e2e">Table: orders (1,000,000 rows)</text>
  
  <g filter="url(#rough)">
    <rect x="35" y="145" width="320" height="28" rx="6" ry="6"
          fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  </g>
  <text x="195" y="164" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1f2937">Row 1: user_id=100…</text>
  
  <g filter="url(#rough)">
    <rect x="35" y="177" width="320" height="28" rx="6" ry="6"
          fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  </g>
  <text x="195" y="196" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1f2937">Row 2: user_id=103…</text>
  
  <g filter="url(#rough)">
    <rect x="35" y="209" width="320" height="28" rx="6" ry="6"
          fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  </g>
  <text x="195" y="228" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1f2937">Row 3: user_id=106…</text>
  
  <g filter="url(#rough)">
    <rect x="35" y="241" width="320" height="28" rx="6" ry="6"
          fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  </g>
  <text x="195" y="260" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1f2937">Row 4: user_id=109…</text>
  
  <g filter="url(#rough)">
    <rect x="35" y="273" width="320" height="28" rx="6" ry="6"
          fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  </g>
  <text x="195" y="292" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1f2937">Row 5: user_id=112…</text>
  
  <g filter="url(#rough)">
    <rect x="35" y="305" width="320" height="28" rx="6" ry="6"
          fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  </g>
  <text x="195" y="324" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7f1d1d">…1,000,000 rows scanned</text>
  <text x="195" y="365" text-anchor="middle"
               font-size="12" fill="#991b1b">O(n) — must scan every row</text>
  <g filter="url(#rough)">
    <rect x="430" y="60" width="370" height="300" rx="8" ry="8"
          fill="none" stroke="#065f46" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="440" y="50" width="216" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="448" y="65" font-size="12" fill="#065f46"
        font-weight="600">With Index: B-Tree Lookup</text>
  <g filter="url(#rough)">
    <rect x="560" y="90" width="110" height="40" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="615" y="115" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">Root: 500</text>
  
  <g filter="url(#rough)">
    <rect x="460" y="160" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="510" y="185" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">&lt; 500: [250]</text>
  
  <g filter="url(#rough)">
    <rect x="650" y="160" width="100" height="40" rx="6" ry="6"
          fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
  </g>
  <text x="700" y="185" text-anchor="middle"
        font-size="14" font-weight="600" fill="#134e4a">&gt; 500: [750]</text>
  
  <g filter="url(#rough)">
    <rect x="435" y="230" width="90" height="35" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="480" y="252.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">[42, 99, 120]</text>
  
  <g filter="url(#rough)">
    <rect x="530" y="230" width="90" height="35" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="575" y="252.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">[310,450,499]</text>
  
  <g filter="url(#rough)">
    <rect x="625" y="230" width="90" height="35" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="670" y="252.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">[501,600,700]</text>
  
  <g filter="url(#rough)">
    <rect x="720" y="230" width="80" height="35" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="760" y="252.5" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">[800,900,999]</text>
  
  <line x1="585" y1="130" x2="510" y2="158"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="625" y1="130" x2="700" y2="158"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="475" y1="200" x2="460" y2="228"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="510" y1="200" x2="555" y2="228"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="690" y1="200" x2="655" y2="228"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="720" y1="200" x2="740" y2="228"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <text x="615" y="305" text-anchor="middle"
               font-size="11" fill="#065f46">Found user_id=42 in O(log n)</text><text x="615" y="325" text-anchor="middle"
               font-size="11" fill="#065f46">~20 comparisons vs 1M rows</text>
  <line x1="480" y1="265" x2="480" y2="295"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="434.5" y="268" width="99" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="480" y="282" text-anchor="middle" font-size="11" fill="#6b7280">→ row pointer</text><text x="480" y="315" text-anchor="middle"
               font-size="10" fill="#374151">Heap fetch</text></svg>