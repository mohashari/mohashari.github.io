<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="440" viewBox="0 0 820 440"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="440" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">Microservices Architecture</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="20" y="180" width="100" height="50" rx="6" ry="6"
          fill="#ffffff" stroke="#1e1e2e" stroke-width="2"/>
  </g>
  <text x="70" y="210" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e1e2e">Web App</text>
  
  <g filter="url(#rough)">
    <rect x="20" y="260" width="100" height="50" rx="6" ry="6"
          fill="#ffffff" stroke="#1e1e2e" stroke-width="2"/>
  </g>
  <text x="70" y="290" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e1e2e">Mobile</text>
  
  <g filter="url(#rough)">
    <rect x="170" y="200" width="130" height="70" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="235" y="227" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">API Gateway</text>
  <text x="235" y="249" text-anchor="middle"
        font-size="11" fill="#1e3a5f" opacity="0.7">auth · rate limit</text>
  <g filter="url(#rough)">
    <rect x="370" y="80" width="120" height="50" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="430" y="110" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">User Service</text>
  
  <g filter="url(#rough)">
    <rect x="370" y="160" width="120" height="50" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="430" y="190" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Order Service</text>
  
  <g filter="url(#rough)">
    <rect x="370" y="240" width="120" height="50" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="430" y="270" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Payment Service</text>
  
  <g filter="url(#rough)">
