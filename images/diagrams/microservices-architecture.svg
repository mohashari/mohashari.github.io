        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="120" y1="285" x2="168" y2="250"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  
  <line x1="300" y1="235" x2="368" y2="130"
