  <g filter="url(#rough)">
    <path d="M 680 185
             a 45 10 0 0 1 90 0
             l 0 50
             a 45 10 0 0 1 -90 0
             Z"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
    <ellipse cx="725" cy="185" rx="45" ry="10"
             fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="725" y="215" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7c2d12">Orders DB</text>
  <g filter="url(#rough)">
    <path d="M 680 295
             a 45 10 0 0 1 90 0
             l 0 50
             a 45 10 0 0 1 -90 0
