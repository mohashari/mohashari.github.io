  </g>
  <text x="430" y="350" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Notify Service</text>
  
  <g filter="url(#rough)">
    <rect x="560" y="180" width="110" height="130" rx="6" ry="6"
          fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="615" y="237" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7c2d12">Message
Bus</text>
  <text x="615" y="259" text-anchor="middle"
        font-size="11" fill="#7c2d12" opacity="0.7">Kafka</text>
  <g filter="url(#rough)">
    <path d="M 680 100
             a 45 10 0 0 1 90 0
             l 0 50
             a 45 10 0 0 1 -90 0
