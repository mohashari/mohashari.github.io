<?xml version="1.0" encoding="UTF-8"?>
<svg width="920" height="460" viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap'); text { font-family: 'Caveat', 'Comic Sans MS', cursive; }</style>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#15803d"/></marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7e22ce"/></marker>
  </defs>
  <rect width="920" height="460" fill="#fafaf8" rx="8"/>
  <text x="460" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1e2e">WAL Comparison: RocksDB vs LevelDB vs PostgreSQL</text>
  <line x1="40" y1="42" x2="880" y2="42" stroke="#e5e3de" stroke-width="1"/>
  <text x="163" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">RocksDB</text>
  <text x="460" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">LevelDB</text>
  <text x="757" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">PostgreSQL</text>
  <line x1="310" y1="48" x2="310" y2="445" stroke="#e5e3de" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="610" y1="48" x2="610" y2="445" stroke="#e5e3de" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- RocksDB -->
  <g filter="url(#rough)"><rect x="50" y="75" width="220" height="48" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/></g>
  <text x="160" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">Write to WAL (MANIFEST)</text>
  <text x="160" y="113" text-anchor="middle" font-size="10" fill="#374151">sync_wal=true | fsync per batch</text>
  <line x1="160" y1="123" x2="160" y2="148" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <g filter="url(#rough)"><rect x="50" y="148" width="220" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/></g>
  <text x="160" y="169" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">MemTable</text>
  <text x="160" y="186" text-anchor="middle" font-size="10" fill="#374151">SkipList / HashSkipList</text>
  <line x1="160" y1="196" x2="160" y2="221" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <g filter="url(#rough)"><rect x="50" y="221" width="220" height="48" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="2"/></g>
  <text x="160" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#be185d">Immutable MemTable</text>
  <text x="160" y="259" text-anchor="middle" font-size="10" fill="#374151">flush to SST (L0 files)</text>
  <line x1="160" y1="269" x2="160" y2="294" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <g filter="url(#rough)"><rect x="50" y="294" width="220" height="48" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/></g>
  <text x="160" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">SST Files (Levels 0-6)</text>
  <text x="160" y="332" text-anchor="middle" font-size="10" fill="#374151">compaction cleans WAL refs</text>
  <g filter="url(#rough)"><rect x="50" y="358" width="220" height="40" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/></g>
  <text x="160" y="375" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">WAL pruned after MemTable flush</text>
  <text x="160" y="390" text-anchor="middle" font-size="10" fill="#64748b">RecoverLogFiles on restart</text>
  <!-- LevelDB -->
  <g filter="url(#rough)"><rect x="348" y="75" width="220" height="48" rx="6" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/></g>
  <text x="458" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Write to log (WriteBatch)</text>
  <text x="458" y="113" text-anchor="middle" font-size="10" fill="#374151">single-writer; no group commit</text>
  <line x1="458" y1="123" x2="458" y2="148" stroke="#15803d" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <g filter="url(#rough)"><rect x="348" y="148" width="220" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/></g>
  <text x="458" y="169" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">MemTable</text>
  <text x="458" y="186" text-anchor="middle" font-size="10" fill="#374151">SkipList only (not pluggable)</text>
  <line x1="458" y1="196" x2="458" y2="221" stroke="#15803d" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <g filter="url(#rough)"><rect x="348" y="221" width="220" height="48" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="2"/></g>
  <text x="458" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#be185d">Immutable MemTable</text>
  <text x="458" y="259" text-anchor="middle" font-size="10" fill="#374151">single background flush thread</text>
  <line x1="458" y1="269" x2="458" y2="294" stroke="#15803d" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <g filter="url(#rough)"><rect x="348" y="294" width="220" height="48" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/></g>
  <text x="458" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">SST Files (Levels 0-6)</text>
  <text x="458" y="332" text-anchor="middle" font-size="10" fill="#374151">sequential compaction only</text>
  <g filter="url(#rough)"><rect x="348" y="358" width="220" height="40" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/></g>
  <text x="458" y="375" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">WAL deleted on MemTable flush</text>
  <text x="458" y="390" text-anchor="middle" font-size="10" fill="#64748b">no WAL recycling / reuse</text>
  <!-- PostgreSQL -->
  <g filter="url(#rough)"><rect x="648" y="75" width="220" height="48" rx="6" fill="#f5f3ff" stroke="#7e22ce" stroke-width="2"/></g>
  <text x="758" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#7e22ce">WAL Buffer (shared mem)</text>
  <text x="758" y="113" text-anchor="middle" font-size="10" fill="#374151">wal_buffers=16MB default</text>
  <line x1="758" y1="123" x2="758" y2="148" stroke="#7e22ce" stroke-width="1.8" marker-end="url(#arr-purple)"/>
  <g filter="url(#rough)"><rect x="648" y="148" width="220" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/></g>
  <text x="758" y="169" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">WAL Writer / walwriter</text>
  <text x="758" y="186" text-anchor="middle" font-size="10" fill="#374151">group commit; wal_sync_method</text>
  <line x1="758" y1="196" x2="758" y2="221" stroke="#7e22ce" stroke-width="1.8" marker-end="url(#arr-purple)"/>
  <g filter="url(#rough)"><rect x="648" y="221" width="220" height="48" rx="6" fill="#fce7f3" stroke="#be185d" stroke-width="2"/></g>
  <text x="758" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#be185d">WAL Segment (16MB file)</text>
  <text x="758" y="259" text-anchor="middle" font-size="10" fill="#374151">pg_wal/; LSN-ordered</text>
  <line x1="758" y1="269" x2="758" y2="294" stroke="#7e22ce" stroke-width="1.8" marker-end="url(#arr-purple)"/>
  <g filter="url(#rough)"><rect x="648" y="294" width="220" height="48" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/></g>
  <text x="758" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">Shared Buffers -&gt; Heap</text>
  <text x="758" y="332" text-anchor="middle" font-size="10" fill="#374151">checkpoint flushes dirty pages</text>
  <g filter="url(#rough)"><rect x="648" y="358" width="220" height="40" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,3"/></g>
  <text x="758" y="375" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">WAL recycled after checkpoint</text>
  <text x="758" y="390" text-anchor="middle" font-size="10" fill="#64748b">ARIES: undo+redo; pg_waldump</text>
  <text x="160" y="420" text-anchor="middle" font-size="10" fill="#6b7280">Recovery: replay WAL into MemTable</text>
  <text x="458" y="420" text-anchor="middle" font-size="10" fill="#6b7280">Recovery: replay from log head</text>
  <text x="758" y="420" text-anchor="middle" font-size="10" fill="#6b7280">Recovery: REDO from last checkpoint LSN</text>
  <text x="460" y="448" text-anchor="middle" font-size="10" fill="#9ca3af">All three guarantee durability via sequential disk writes before acknowledging writes to the client</text>
</svg>
