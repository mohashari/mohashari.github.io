<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="400" viewBox="0 0 820 400"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&amp;display=swap');
      text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
    </style>
    <!-- Slight hand-drawn roughness filter -->
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3"
                    seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Arrow marker – dark -->
    <marker id="arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <!-- Arrow marker – colored -->
    <marker id="arr-color" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
    <!-- Arrow marker – white (for dark backgrounds) -->
    <marker id="arr-white" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="820" height="400" fill="#fafaf8" rx="8"/>
<text x="410" y="34" text-anchor="middle"
               font-size="17" font-weight="700" fill="#1e1e2e">Token Bucket Rate Limiting Algorithm</text>
  <line x1="40" y1="44" x2="780" y2="44" stroke="#e5e3de" stroke-width="1"/>
  <g filter="url(#rough)">
    <rect x="40" y="140" width="150" height="60" rx="6" ry="6"
          fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  </g>
  <text x="115" y="162" text-anchor="middle"
        font-size="14" font-weight="600" fill="#1e3a5f">Token Refiller</text>
  <text x="115" y="184" text-anchor="middle"
        font-size="11" fill="#1e3a5f" opacity="0.7">10 tokens/sec</text>
  <line x1="190" y1="170" x2="280" y2="170"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="200" y="158" width="78" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="235" y="172" text-anchor="middle" font-size="11" fill="#6b7280">add tokens</text>
  <g filter="url(#rough)">
    <path d="M 280 120
             a 60 10 0 0 1 120 0
             l 0 90
             a 60 10 0 0 1 -120 0
             Z"
          fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
    <ellipse cx="340" cy="120" rx="60" ry="10"
             fill="#fef9c3" stroke="#854d0e" stroke-width="2"/>
  </g>
  <text x="340" y="170" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7c2d12">Token Bucket</text><text x="340" y="230" text-anchor="middle"
               font-size="11" fill="#854d0e">capacity: 100</text><circle cx="300" cy="155" r="6" fill="#b45309" opacity="0.5"/><circle cx="316" cy="155" r="6" fill="#b45309" opacity="0.5"/><circle cx="332" cy="155" r="6" fill="#b45309" opacity="0.5"/><circle cx="348" cy="155" r="6" fill="#b45309" opacity="0.5"/><circle cx="364" cy="155" r="6" fill="#b45309" opacity="0.5"/><text x="370" y="155" text-anchor="middle"
               font-size="14" fill="#b45309">...</text>
  <g filter="url(#rough)">
    <polygon points="530,130 590,165 530,200 470,165"
             fill="#ffedd5" stroke="#9a3412" stroke-width="2"/>
  </g>
  <text x="530" y="170" text-anchor="middle"
        font-size="13" font-weight="600" fill="#7c2d12">Token
Available?</text>
  <line x1="400" y1="160" x2="468" y2="165"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="409.5" y="150.5" width="57" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="434" y="164.5" text-anchor="middle" font-size="11" fill="#6b7280">request</text>
  <g filter="url(#rough)">
    <rect x="660" y="110" width="110" height="50" rx="6" ry="6"
          fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  </g>
  <text x="715" y="140" text-anchor="middle"
        font-size="14" font-weight="600" fill="#064e3b">Allow</text>
  
  <line x1="590" y1="165" x2="658" y2="135"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="613.5" y="138" width="29" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="624" y="152" text-anchor="middle" font-size="11" fill="#6b7280">YES</text><text x="620" y="145" text-anchor="middle"
               font-size="10" fill="#065f46">consume 1 token</text>
  <g filter="url(#rough)">
    <rect x="660" y="210" width="110" height="50" rx="6" ry="6"
          fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  </g>
  <text x="715" y="240" text-anchor="middle"
        font-size="14" font-weight="600" fill="#7f1d1d">Reject 429</text>
  
  <line x1="530" y1="200" x2="658" y2="235"
        stroke="#374151" stroke-width="1.8" 
        marker-end="url(#arr)"/>
  <rect x="587" y="205.5" width="22" height="18"
                   fill="#fafaf8" rx="3"/>
    <text x="594" y="219.5" text-anchor="middle" font-size="11" fill="#6b7280">NO</text>
  <g filter="url(#rough)">
    <rect x="20" y="300" width="780" height="80" rx="8" ry="8"
          fill="none" stroke="#374151" stroke-width="1.5" stroke-dasharray="6 3"
          opacity="0.6"/>
  </g>
  <rect x="30" y="290" width="208" height="20"
        fill="#fafaf8" rx="3"/>
  <text x="38" y="305" font-size="12" fill="#374151"
        font-weight="600">Comparison of Algorithms</text><text x="80" y="330" text-anchor="middle"
               font-size="12" fill="#1e1e2e">Fixed Window</text><text x="80" y="352" text-anchor="middle"
               font-size="10" fill="#6b7280">Simple, burst at boundary</text><text x="280" y="330" text-anchor="middle"
               font-size="12" fill="#1e1e2e">Sliding Window</text><text x="280" y="352" text-anchor="middle"
               font-size="10" fill="#6b7280">Accurate, high memory</text><text x="480" y="330" text-anchor="middle"
               font-size="12" fill="#1e1e2e">Token Bucket</text><text x="480" y="352" text-anchor="middle"
               font-size="10" fill="#6b7280">Allows bursts</text><text x="680" y="330" text-anchor="middle"
               font-size="12" fill="#1e1e2e">Leaky Bucket</text><text x="680" y="352" text-anchor="middle"
               font-size="10" fill="#6b7280">Smooth output</text></svg>