<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="sans-serif">
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L10,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1000" height="700" fill="#ffffff"/>

  <!-- ===== CONTROL PLANE ZONE ===== -->
  <rect x="10" y="10" width="980" height="100" rx="10" fill="#e5dbff" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="16" y="26" font-size="12" fill="#6d28d9" font-weight="600">Control Plane</text>

  <!-- CiliumNetworkPolicy -->
  <rect x="20" y="32" width="220" height="62" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="130" y="57" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">CiliumNetworkPolicy</text>
  <text x="130" y="75" text-anchor="middle" font-size="12" fill="#5b21b6">(Custom Resource)</text>

  <!-- kube-apiserver -->
  <rect x="388" y="32" width="200" height="62" rx="8" fill="#a5d8ff" stroke="#2563eb" stroke-width="2"/>
  <text x="488" y="57" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">kube-apiserver</text>
  <text x="488" y="75" text-anchor="middle" font-size="12" fill="#1e40af">policy storage</text>

  <!-- Cilium Agent (control plane) -->
  <rect x="757" y="32" width="220" height="62" rx="8" fill="#b2f2bb" stroke="#16a34a" stroke-width="2"/>
  <text x="867" y="57" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Cilium Agent</text>
  <text x="867" y="75" text-anchor="middle" font-size="12" fill="#14532d">compiles to eBPF bytecode</text>

  <!-- Arrow: CNP -> apiserver -->
  <line x1="240" y1="63" x2="388" y2="63" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="314" y="57" text-anchor="middle" font-size="11" fill="#6d28d9">watch</text>

  <!-- Arrow: apiserver -> Cilium Agent -->
  <line x1="588" y1="63" x2="757" y2="63" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="672" y="57" text-anchor="middle" font-size="11" fill="#1e40af">policy delta</text>

  <!-- ===== KUBERNETES NODE ===== -->
  <rect x="10" y="125" width="980" height="565" rx="10" fill="#dbe4ff" fill-opacity="0.3" stroke="#2563eb" stroke-width="2"/>
  <text x="20" y="144" font-size="15" font-weight="bold" fill="#1e3a5f">Kubernetes Node</text>

  <!-- Load arrow: Cilium Agent CP -> Node (load eBPF) -->
  <line x1="867" y1="94" x2="867" y2="154" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="875" y="128" font-size="11" fill="#14532d">load</text>

  <!-- ===== USER SPACE ZONE ===== -->
  <rect x="25" y="152" width="950" height="95" rx="8" fill="#e5dbff" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="32" y="168" font-size="11" fill="#6d28d9" font-weight="600">User Space</text>

  <!-- Cilium Agent Daemon -->
  <rect x="340" y="170" width="320" height="60" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="500" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">Cilium Agent Daemon</text>
  <text x="500" y="213" text-anchor="middle" font-size="12" fill="#5b21b6">compiles policies → eBPF bytecode, loads via bpf()</text>

  <!-- Arrow: daemon -> kernel -->
  <line x1="500" y1="230" x2="500" y2="255" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- ===== KERNEL SPACE ZONE ===== -->
  <rect x="25" y="258" width="950" height="310" rx="8" fill="#c3fae8" fill-opacity="0.55" stroke="#0d9488" stroke-width="2"/>
  <text x="32" y="276" font-size="13" font-weight="bold" fill="#134e4a">Linux Kernel — eBPF Programs &amp; Maps</text>

  <!-- eBPF HOOKS row -->
  <!-- XDP Hook -->
  <rect x="45" y="290" width="155" height="60" rx="6" fill="#a7f3d0" stroke="#0d9488" stroke-width="2"/>
  <text x="122" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">XDP Hook</text>
  <text x="122" y="332" text-anchor="middle" font-size="11" fill="#134e4a">pre-stack, L2/L3</text>

  <!-- TC Ingress Hook -->
  <rect x="225" y="290" width="165" height="60" rx="6" fill="#a7f3d0" stroke="#0d9488" stroke-width="2"/>
  <text x="307" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">TC Ingress Hook</text>
  <text x="307" y="332" text-anchor="middle" font-size="11" fill="#134e4a">per veth, inbound</text>

  <!-- TC Egress Hook -->
  <rect x="418" y="290" width="165" height="60" rx="6" fill="#a7f3d0" stroke="#0d9488" stroke-width="2"/>
  <text x="500" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">TC Egress Hook</text>
  <text x="500" y="332" text-anchor="middle" font-size="11" fill="#134e4a">per veth, outbound</text>

  <!-- cgroup BPF Hook -->
  <rect x="610" y="290" width="165" height="60" rx="6" fill="#a7f3d0" stroke="#0d9488" stroke-width="2"/>
  <text x="692" y="314" text-anchor="middle" font-size="13" font-weight="bold" fill="#134e4a">cgroup BPF Hook</text>
  <text x="692" y="332" text-anchor="middle" font-size="11" fill="#134e4a">socket-level, L4+</text>

  <!-- eBPF MAPS row -->
  <!-- Policy Map -->
  <rect x="45" y="390" width="155" height="58" rx="6" fill="#b2f2bb" stroke="#16a34a" stroke-width="2"/>
  <text x="122" y="413" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">Policy Map</text>
  <text x="122" y="431" text-anchor="middle" font-size="11" fill="#14532d">LPM trie</text>

  <!-- CT Map -->
  <rect x="225" y="390" width="165" height="58" rx="6" fill="#b2f2bb" stroke="#16a34a" stroke-width="2"/>
  <text x="307" y="413" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">CT Map</text>
  <text x="307" y="431" text-anchor="middle" font-size="11" fill="#14532d">conn tracking</text>

  <!-- IP Cache Map -->
  <rect x="418" y="390" width="165" height="58" rx="6" fill="#b2f2bb" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="413" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">IP Cache Map</text>
  <text x="500" y="431" text-anchor="middle" font-size="11" fill="#14532d">endpoint IDs</text>

  <!-- LB Map -->
  <rect x="610" y="390" width="165" height="58" rx="6" fill="#b2f2bb" stroke="#16a34a" stroke-width="2"/>
  <text x="692" y="413" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">LB Map</text>
  <text x="692" y="431" text-anchor="middle" font-size="11" fill="#14532d">service VIPs</text>

  <!-- Arrows: hooks -> maps -->
  <line x1="122" y1="350" x2="122" y2="390" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="307" y1="350" x2="307" y2="390" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="500" y1="350" x2="500" y2="390" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="692" y1="350" x2="692" y2="390" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Performance annotation box -->
  <rect x="808" y="285" width="157" height="165" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="886" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">eBPF overhead</text>
  <text x="886" y="323" text-anchor="middle" font-size="12" fill="#92400e">~0.5 μs/packet</text>
  <line x1="820" y1="333" x2="954" y2="333" stroke="#f59e0b" stroke-width="1"/>
  <text x="886" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">Sidecar proxy</text>
  <text x="886" y="368" text-anchor="middle" font-size="12" fill="#92400e">3–5 ms/request</text>
  <text x="886" y="386" text-anchor="middle" font-size="12" fill="#92400e">+256 MB/pod</text>
  <line x1="820" y1="396" x2="954" y2="396" stroke="#f59e0b" stroke-width="1"/>
  <text x="886" y="414" text-anchor="middle" font-size="11" fill="#92400e">10,000x faster</text>
  <text x="886" y="430" text-anchor="middle" font-size="11" fill="#92400e">data path</text>

  <!-- ===== PODS ROW ===== -->
  <!-- Pod A -->
  <rect x="30" y="575" width="195" height="80" rx="8" fill="#a5d8ff" stroke="#2563eb" stroke-width="2"/>
  <text x="127" y="600" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Pod A</text>
  <text x="127" y="618" text-anchor="middle" font-size="12" fill="#1e40af">app container only</text>
  <text x="127" y="636" text-anchor="middle" font-size="11" fill="#1e40af">no sidecar</text>

  <!-- veth0 -->
  <rect x="270" y="588" width="80" height="54" rx="6" fill="#ffd8a8" stroke="#d97706" stroke-width="2"/>
  <text x="310" y="612" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">veth0</text>
  <text x="310" y="630" text-anchor="middle" font-size="10" fill="#92400e">host-side</text>

  <!-- veth1 -->
  <rect x="652" y="588" width="80" height="54" rx="6" fill="#ffd8a8" stroke="#d97706" stroke-width="2"/>
  <text x="692" y="612" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">veth1</text>
  <text x="692" y="630" text-anchor="middle" font-size="10" fill="#92400e">host-side</text>

  <!-- Pod B -->
  <rect x="777" y="575" width="195" height="80" rx="8" fill="#a5d8ff" stroke="#2563eb" stroke-width="2"/>
  <text x="874" y="600" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Pod B</text>
  <text x="874" y="618" text-anchor="middle" font-size="12" fill="#1e40af">app container only</text>
  <text x="874" y="636" text-anchor="middle" font-size="11" fill="#1e40af">no sidecar</text>

  <!-- Pod A -> veth0 -->
  <line x1="225" y1="615" x2="270" y2="615" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- veth1 -> Pod B -->
  <line x1="732" y1="615" x2="777" y2="615" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Traffic flow arrow: veth0 -> [eBPF enforced] -> veth1 -->
  <line x1="350" y1="615" x2="652" y2="615" stroke="#ef4444" stroke-width="3" marker-end="url(#arrowRed)"/>
  <rect x="390" y="640" width="222" height="22" rx="4" fill="#fee2e2"/>
  <text x="501" y="656" text-anchor="middle" font-size="12" fill="#b91c1c">kernel eBPF enforced — no Envoy</text>

  <!-- Traffic flow dashed upward to TC hooks -->
  <line x1="310" y1="588" x2="307" y2="350" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="692" y1="588" x2="500" y2="350" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Title at very top -->
  <text x="500" y="676" text-anchor="middle" font-size="13" fill="#6b7280">eBPF enforces policy in kernel — Pods communicate directly without per-pod sidecar proxies</text>
</svg>
